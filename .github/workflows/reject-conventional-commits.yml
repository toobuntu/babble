# This file is a hand-copy of Homebrew/brew's .github/workflows/reject-conventional-commits.yml,
# staged ahead of the repo-foundation upstream sync; do not modify it directly.
name: Commit Style

on:
  pull_request:
    branches: ["**"]

permissions: {}

jobs:
  reject-conventional-commits:
    runs-on: ubuntu-slim
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 25
          persist-credentials: false

      - name: Check commit titles
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          set -euo pipefail
          pattern='^(feat|fix|chore|refactor|perf|ci)(\([^)]*\))?!?:'
          violations=()
          while IFS= read -r title; do
            if [[ "$title" =~ $pattern ]]; then
              violations+=("$title")
            fi
          done < <(git log --format=%s "${BASE_SHA}..${HEAD_SHA}")
          if (( ${#violations[@]} > 0 )); then
            echo "Conventional commit prefixes are not allowed. Found:"
            printf '  - %s\n' "${violations[@]}"
            exit 1
          fi
          echo "OK — no conventional commit prefixes found."
